name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      # Real Postgres for the vitest `workers` project (miniflare hyperdrives).
      # pgvector image because the baseline schema installs the vector extension.
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: felix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/felix_test
    steps:
      - uses: actions/checkout@v7
      # version comes from the root package.json `packageManager` field
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # bundled.ts files (manifests/skills) are gitignored; typecheck and
      # tests import them, so they must be generated first
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test

  chat-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/chat-ui
    steps:
      - uses: actions/checkout@v7
      # version comes from the root package.json `packageManager` field
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      # chat-ui is a workspace app (@felix/chat-ui) — install from the repo
      # root so workspace links resolve, then build just this app.
      - run: pnpm install --frozen-lockfile
        working-directory: .
      - run: pnpm build
