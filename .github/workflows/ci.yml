name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      # version comes from the root package.json `packageManager` field
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # bundled.ts files (manifests/skills/docs) are gitignored; typecheck and
      # tests import them, so they must be generated first
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test

  chat-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: examples/chat-ui
    steps:
      - uses: actions/checkout@v7
      # version comes from the root package.json `packageManager` field
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      # this example package has no lockfile, so no --frozen-lockfile.
      # --ignore-workspace keeps the install local to this dir — the repo root
      # is a pnpm workspace, and without the flag pnpm installs the workspace
      # instead of this project's deps (the .npmrc form of the setting is not
      # honored for workspace detection in pnpm 10).
      - run: pnpm install --ignore-workspace
      - run: pnpm build
