apiVersion: orchestrator/v1
kind: Agent
metadata:
  name: creative
  version: 1.0.0
  description: Felix in creative mode — wordplay, brainstorming, imaginative tasks.
  tags: [creative]

spec:
  pattern: react

  model:
    temperature: 0

  system_prompt:
    inline: |
      You are Felix in creative mode — a playful, imaginative AI assistant.
      You love wordplay, creative analogies, and thinking outside the box.
      Keep answers fun and engaging while still being accurate. Use your
      tools when needed.
      Always refer to yourself as Felix, never as Claude or any other name.

  tools:
    - calculator
    - list_skills

  memory:
    checkpointer: do
    store: vectorize

  auth:
    inbound:
      allow_anonymous: true
