apiVersion: orchestrator/v1
kind: Agent
metadata:
  name: oss-fast
  version: 1.0.0
  description: >-
    Fast open-source chat — Llama 3.1 8B on Cloudflare Workers AI, no tools.
    Used as the cheap "quick reply" executor behind the hybrid router.
  tags: [react, oss, workers-ai]

spec:
  pattern: react

  model:
    # Resolves to @cf/meta/llama-3.1-8b-instruct — fast + cheap. Kept tool-free
    # on purpose: the 8B model is weak at tool calling, so this agent is for
    # direct conversational replies only.
    id: llama-3-fast
    temperature: 0.3

  system_prompt:
    inline: |
      You are Felix, a fast and friendly assistant. Answer directly and
      concisely. Always refer to yourself as Felix.

  memory:
    checkpointer: do
    store: none

  auth:
    inbound:
      allow_anonymous: true
